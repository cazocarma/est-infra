name: greenvic-est-${EST_ENV:-dev}

# =============================================================================
# EST — docker-compose.dev.yml (overlay DESARROLLO LOCAL)
#
# Se usa automaticamente cuando EST_ENV=dev en .env.
# Combinacion: docker compose -f docker-compose.yml -f docker-compose.dev.yml
#
# Define los overrides especificos de dev:
#   - Back con build target `dev`, `tsx watch` sobre /app/src.
#   - Front con `ng serve` hot-reload (target `build`, memory lift a 2G).
#   - NODE_ENV=development, LOG_LEVEL=debug.
#   - OIDC URLs publicas -> localhost:82 (via router de platform dev).
#   - Cookies relajadas (SECURE=false, SAMESITE=lax) para HTTP plano.
#
# Requisitos:
#   - `platform` arriba con PLATFORM_ENV=dev (keycloak dev-mem + router).
#   - EST_ENV=dev en .env.
# =============================================================================

services:
  back:
    image: est-back:dev
    container_name: est-back-dev
    build:
      target: dev
    read_only: false
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      # OIDC: browser -> Keycloak local (via router de platform dev en :8080).
      OIDC_ISSUER_URL: http://localhost:8080/realms/ESTRealm
      OIDC_REDIRECT_URI: http://localhost:82/api/v1/auth/callback
      OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:82/login
      # Cookies relajadas (HTTP plano en dev).
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_SAMESITE: lax
    volumes:
      - ../est-back/src:/app/src:ro
      - ../est-back/package.json:/app/package.json:ro
      - ../est-back/package-lock.json:/app/package-lock.json:ro
      - ../est-back/tsconfig.json:/app/tsconfig.json:ro
      - ../est-back/tsconfig.build.json:/app/tsconfig.build.json:ro
      - ./.env:/app/.env:ro
      - est_uploads:/var/lib/est/uploads

  front-ng:
    image: est-front-ng:dev
    container_name: est-front-dev
    build:
      target: deps
    read_only: false
    user: "0:0"
    command:
      - "sh"
      - "-lc"
      - "npx ng serve --host 0.0.0.0 --port 3000 --poll 1000 --allowed-hosts=all --proxy-config proxy.conf.json"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    volumes:
      - ../est-front-ng/src:/app/src:cached
      - ../est-front-ng/public:/app/public:cached
      - ../est-front-ng/angular.json:/app/angular.json:ro
      - ../est-front-ng/tsconfig.json:/app/tsconfig.json:ro
      - ../est-front-ng/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ../est-front-ng/tailwind.config.js:/app/tailwind.config.js:ro
      - ../est-front-ng/postcss.config.js:/app/postcss.config.js:ro
      - ../est-front-ng/proxy.conf.json:/app/proxy.conf.json:ro
      - ../est-front-ng/package.json:/app/package.json:ro
